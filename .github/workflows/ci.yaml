name: CI

on: 
  push: 
    branches:
      - master
  pull_request:
    branches:
      - master
  
jobs: 
  build-and-test:
    runs-on: ${{matrix.os}}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rs/toolchain@v1
      
      - name: Build
        uses: actions-rs/cargo@v1
        with: 
          command: build
          args: --verbose
      
      - name: Test
        uses: actions-rs/cargo@v1
        with: 
          command: test
          args: --verbose

      - name: Check formatting
        uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

      - name: Run clippy
        uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings
